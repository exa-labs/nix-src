name: "CI"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
  merge_group:

permissions:
  contents: "read"
  id-token: "write"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/determinate-nix-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main
      - run: nix flake show --all-systems --json

  build:
    name: build (${{ matrix.system }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
          - system: aarch64-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@main
      - uses: DeterminateSystems/flakehub-cache-action@main
      - name: Build Nix
        run: nix build .#packages.${{ matrix.system }}.default --no-link -L
      - name: Run checks and tests
        run: nix flake check --keep-going . -L --system ${{ matrix.system }}

  success:
    name: CI success
    runs-on: ubuntu-latest
    needs:
      - eval
      - build
    if: ${{ always() }}
    steps:
      - run: "true"
      - run: |
          echo "A required job failed:"
          echo "$needs"
          exit 1
        env:
          needs: ${{ toJSON(needs) }}
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
